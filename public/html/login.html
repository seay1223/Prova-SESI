<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova SESI - LOGIN</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="menu-container">
        <img class="img-logo" src="/img/logo.png" alt="Logo-SESI-SP">
    </div>
    <div class="main">
        <form id="loginForm" class="login-container">
            <label>Login</label>
            <div class="login">
                <label>CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="button-container">
                <button type="button" id="btn-cadastro" class="login-btn">Cadastrar</button>
                <button type="submit" id="btn-login" class="login-btn">Login</button>
                <button type="button" id="btn-ver-usuarios" class="login-btn">Ver Usuários</button>
            </div>
            <div id="message" class="message"></div>
        </form>
    </div>
    <div class="footer-container">
        <h1 class="footer-h1">@2026 SESI - Todos os direitos reservados</h1>
    </div>
    <script src="/js/redirect.js"></script>
</body>
</html>
