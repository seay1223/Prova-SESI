<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova SESI - CADASTRO</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="menu-container">
        <img class="img-logo" src="/img/logo.png" alt="Logo-SESI-SP">
    </div>
    <div class="main">
        <form id="cadastroForm" class="login-container"> 
            <label>Cadastro</label>
            <div class="login">
                <label>Nome Completo:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="login">
                <label>CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="button-container">
                <button type="submit" id="btn-register" class="login-btn">Cadastrar</button>
            </div>
            <div id="message" class="message"></div>
        </form>
    </div>
    <div class="footer-container">
        <h1 class="footer-h1">@2026</h1>
    </div>
    <script src="/js/redirect.js"></script>
</body>
</html>
