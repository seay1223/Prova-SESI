<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SESI</title>
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="menu-container">
        <img class="img-logo" src="/img/logo.png" alt="Logo SESI">
    </div>
    <div class="main">
        <form id="cadastroForm" class="login-container">
            <div class="login-title">Criar Conta</div>
            <div class="login-group">
                <label><span class="label-icon">👤</span> Tipo de Usuário</label>
                <select id="tipoUsuario" required>
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                </select>
            </div>
            <div class="login-group">
                <label><span class="label-icon">📄</span> Nome Completo</label>
                <div class="input-wrapper">
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>
            </div>
            <div class="login-group">
                <label><span class="label-icon">📄</span> CPF</label>
                <div class="input-wrapper">
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>
            </div>
            <div class="login-group">
                <label><span class="label-icon">🔑</span> Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>
            </div>
            <div class="login-group" id="campoTurmaCadastro" style="display: none;">
                <label><span class="label-icon">🏫</span> Turma</label>
                <div class="input-wrapper">
                    <input type="text" id="turma" placeholder="Ex: 3° Ano A">
                </div>
            </div>
            <div class="button-container">
                <button type="submit" class="login-btn">Cadastrar</button>
                <button type="button" id="btn-voltar" class="login-btn secondary">Voltar</button>
            </div>
            <div id="message" class="message"></div>
        </form>
    </div>
    <div class="footer-container">
        <h1 class="footer-h1">© 2026 SESI - Todos os direitos reservados</h1>
    </div>
    <script src="/js/cadastro.js"></script>
</body>
</html>
